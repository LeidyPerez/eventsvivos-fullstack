<div class="container">
  <h2>Crear Evento</h2>

  @if (mensaje) {
    <p class="exito">{{ mensaje }}</p>
  }

  @if (error) {
    <p class="error">{{ error }}</p>
  }

  <div class="formulario">
    <label>Título</label>
    <input [(ngModel)]="evento.titulo" placeholder="Título del evento" />

    <label>Descripción</label>
    <textarea [(ngModel)]="evento.descripcion" placeholder="Descripción del evento"></textarea>

    <label>Venue</label>
    <select [(ngModel)]="evento.venueId">
      <option [value]="1">Auditorio Central - Bogotá (200)</option>
      <option [value]="2">Sala Norte - Bogotá (50)</option>
      <option [value]="3">Arena Sur - Medellín (500)</option>
    </select>

    <label>Capacidad Máxima</label>
    <input type="number" [(ngModel)]="evento.capacidadMaxima" />

    <label>Fecha y Hora de Inicio</label>
    <input type="datetime-local" [(ngModel)]="evento.fechaHoraInicio" />

    <label>Fecha y Hora de Fin</label>
    <input type="datetime-local" [(ngModel)]="evento.fechaHoraFin" />

    <label>Precio de Entrada</label>
    <input type="number" [(ngModel)]="evento.precioEntrada" />

    <label>Tipo de Evento</label>
    <select [(ngModel)]="evento.tipoEvento">
      <option value="conferencia">Conferencia</option>
      <option value="taller">Taller</option>
      <option value="concierto">Concierto</option>
    </select>

    <button (click)="crear()">Crear Evento</button>
    <a routerLink="/eventos">Cancelar</a>
  </div>
</div>
